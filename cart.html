<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>购物车 - CloudShop</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="site-header">
      <nav class="nav container" aria-label="主导航">
        <a class="brand" href="./index.html#top" aria-label="CloudShop 首页">
          <span class="brand-mark" aria-hidden="true">
            <svg viewBox="0 0 48 48" role="img" focusable="false">
              <path d="M18.8 33.5h15.1a8.1 8.1 0 0 0 1.2-16.1 11.4 11.4 0 0 0-21.7 3.4 6.5 6.5 0 0 0 5.4 12.7Z" />
              <path d="M17.6 24.1h12.8" />
            </svg>
          </span>
          <span>CloudShop</span>
        </a>
        <div class="nav-actions">
          <div class="nav-links">
            <a href="./index.html#products">商品</a>
            <a href="./index.html#features">优势</a>
            <a href="#contact">联系</a>
          </div>
          <a class="cart-link" href="./cart.html" aria-label="查看购物车">
            🛒 <span>购物车</span><strong id="cartCount">0</strong>
          </a>
          <button class="theme-toggle" id="themeToggle" type="button" aria-label="切换深色模式" aria-pressed="false">
            <span class="theme-icon" aria-hidden="true">🌙</span>
            <span class="theme-text">深色</span>
          </button>
        </div>
      </nav>
    </header>

    <main id="top" class="detail-page">
      <section class="detail-hero container">
        <div class="detail-copy reveal">
          <a class="btn btn-ghost back-home-link" href="./index.html">← 返回首页</a>
          <p class="eyebrow">Shopping Cart</p>
          <h1>我的购物车</h1>
          <p class="hero-text">购物车数据会保存在浏览器 LocalStorage 中，无需后端即可记录已选择的虚拟商品。</p>
        </div>
        <aside class="detail-panel cart-summary reveal reveal-delay" aria-label="购物车汇总">
          <div class="detail-icon" aria-hidden="true">🛒</div>
          <span>订单总计</span>
          <strong id="cartTotal">¥0</strong>
          <p id="cartSummaryText">当前购物车为空。</p>
          <button class="btn btn-primary" type="button" id="checkoutButton">联系客服购买</button>
        </aside>
      </section>

      <section class="cart-section container reveal">
        <div class="cart-toolbar">
          <div>
            <p class="eyebrow">Cart Items</p>
            <h2>已选商品</h2>
          </div>
          <button class="btn btn-ghost" type="button" id="clearCartButton">清空购物车</button>
        </div>
        <div class="cart-items" id="cartItems" aria-live="polite"></div>
      </section>
    </main>

    <footer id="contact" class="site-footer">
      <div class="container footer-content">
        <p>© 2026 CloudShop. 专注虚拟商品销售。</p>
        <a href="mailto:support@cloudshop.example">support@cloudshop.example</a>
      </div>
    </footer>

    <button class="back-to-top" id="backToTop" type="button" aria-label="返回顶部">↑</button>
    <div class="toast" id="toast" role="status" aria-live="polite"></div>

    <script src="./script.js"></script>
  </body>
</html>
